<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="サロン予約 - 管理">
<meta name="theme-color" content="#b06f82">
<title>サロン予約 管理画面</title>
<style>
:root{
--main:#c98a9c;
--main-dark:#b06f82;
--bg:#0f2e1d;
--panel-bg:#fdf6f4;
--card:#ffffff;
--line:#eee0e0;
--text:#4a3a3a;
--sub:#9a8585;
--ok:#7fb88f;
--ok-bg:#e8f5ea;
--busy:#d98b8b;
--busy-bg:#fbe9e9;
--holiday:#b8a6a6;
--holiday-bg:#ece4e4;
}
*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
background:var(--bg);
color:var(--text);
padding-bottom:50px;
}
#loginScreen{
min-height:100vh;display:flex;align-items:center;justify-content:center;
flex-direction:column;padding:24px;text-align:center;
}
#loginScreen .icon{font-size:2.6rem;margin-bottom:10px;}
#loginScreen h1{font-size:1.2rem;margin:0 0 6px;}
#loginScreen p{color:var(--sub);font-size:.85rem;margin:0 0 26px;}
.google-btn{
display:inline-flex;align-items:center;gap:10px;background:#fff;
border:1px solid var(--line);padding:12px 22px;border-radius:12px;
font-size:.9rem;font-weight:600;color:var(--text);cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.google-btn:hover{background:#fbf5f5;}
.google-btn svg{width:18px;height:18px;}
header{
background:linear-gradient(135deg,var(--main),var(--main-dark));
color:#fff;padding:16px 16px;display:flex;align-items:center;
justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
header .who{font-size:.78rem;opacity:.95;}
header .who b{font-weight:600;}
header button{
background:rgba(255,255,255,0.18);border:none;color:#fff;
padding:7px 14px;border-radius:9px;font-size:.78rem;cursor:pointer;
}
.sync-row{
text-align:center;font-size:.72rem;color:var(--sub);padding:8px 0 0;
display:flex;align-items:center;justify-content:center;gap:6px;
}
.dot{width:7px;height:7px;border-radius:50%;background:#7fb88f;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.container{max-width:620px;margin:0 auto;padding:16px;}
.stats-row{display:flex;gap:10px;margin-bottom:14px;}
.stat-card{
flex:1;background:var(--card);border-radius:14px;padding:14px;
text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.stat-card .num{font-size:1.5rem;font-weight:700;}
.stat-card .label{font-size:.72rem;color:var(--sub);margin-top:2px;}
.stat-card.open .num{color:var(--ok);}
.stat-card.busy .num{color:var(--busy);}
.nav{
display:flex;align-items:center;justify-content:space-between;
background:var(--card);border-radius:14px;padding:10px 14px;
margin-bottom:6px;box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.nav button{
background:var(--panel-bg);border:1px solid var(--line);color:var(--main-dark);
padding:8px 14px;border-radius:10px;font-size:.85rem;cursor:pointer;
}
.nav .date-label{font-weight:600;font-size:.95rem;text-align:center;}
.holiday-toggle{margin:0 0 16px;display:flex;justify-content:center;}
.holiday-toggle button{
border:1px solid var(--line);background:var(--card);color:var(--sub);
padding:9px 18px;border-radius:10px;font-size:.82rem;cursor:pointer;
}
.holiday-toggle button.active{
background:var(--holiday-bg);color:#7a6a6a;border-color:var(--holiday);font-weight:600;
}
.help-text{font-size:.75rem;color:var(--sub);text-align:center;margin-bottom:14px;line-height:1.5;}
.closed-card{
background:var(--card);border-radius:16px;padding:36px 20px;text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);color:var(--sub);
}
.closed-card .big{font-size:2.2rem;margin-bottom:8px;}
.slot-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.slot{
display:flex;align-items:center;justify-content:space-between;
background:var(--card);border-radius:12px;padding:12px 16px;
box-shadow:0 1px 4px rgba(0,0,0,0.05);border:1px solid var(--line);gap:10px;
}
.slot .time{font-weight:600;font-size:.92rem;width:64px;flex-shrink:0;}
.slot .info{flex:1;font-size:.8rem;}
.slot .info .name{font-weight:600;}
.slot .info .phone,.slot .info .email,.slot .info .code{color:var(--sub);font-size:.74rem;display:block;}
.slot .info .code b{color:var(--main-dark);letter-spacing:.04em;}
.slot .badge{font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;}
.slot.open .badge{background:var(--ok-bg);color:var(--ok);}
.slot.busy .badge{background:var(--busy-bg);color:var(--busy);}
.slot.blocked .badge{background:var(--holiday-bg);color:#8a7a7a;}
.slot button{
border:none;padding:7px 12px;border-radius:9px;font-size:.76rem;
font-weight:600;cursor:pointer;flex-shrink:0;
}
.btn-block{background:var(--panel-bg);color:var(--sub);border:1px solid var(--line);}
.btn-cancel-r{background:var(--busy-bg);color:var(--busy);}
.btn-phone-add{background:var(--main);color:#fff;}
.btn-unblock{background:var(--panel-bg);color:var(--sub);border:1px solid var(--line);}
.toast{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
background:#3c2f2f;color:#fff;padding:11px 20px;border-radius:30px;font-size:.85rem;
opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;
align-items:center;justify-content:center;padding:20px;z-index:50;
}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:18px;padding:24px 22px;width:100%;max-width:380px;}
.modal h2{margin:0 0 4px;font-size:1.1rem;}
.modal .sub{color:var(--sub);font-size:.85rem;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:.8rem;color:var(--sub);margin-bottom:5px;}
.field input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);font-size:.95rem;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions button{
flex:1;padding:11px;border-radius:10px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;
}
.btn-cancel{background:var(--panel-bg);color:var(--sub);}
.btn-confirm{background:var(--main);color:#fff;}
.btn-confirm:hover{background:var(--main-dark);}
#app{display:none;}
</style>
</head>
<body>
<div id="loginScreen">
<div class="icon">💇‍♀️</div>
<h1>サロン予約 管理画面</h1>
<p>Googleアカウントでログインしてください</p>
<button class="google-btn" id="googleLoginBtn">
<svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C33.5 6.1 29 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 12 24 12c3.1 0 5.8 1.1 8 3l5.7-5.7C33.5 6.1 29 4 24 4c-7.7 0-14.3 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.4 26.7 36 24 36c-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.6 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C40.9 36.3 44 30.7 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
Googleでログイン
</button>
</div>
<div id="app">
<header>
<div class="who">ログイン中: <b id="userEmail">-</b></div>
<button id="logoutBtn">ログアウト</button>
</header>
<div class="sync-row"><span class="dot"></span> リアルタイム同期中</div>
<div class="container">
<div class="stats-row">
<div class="stat-card open"><div class="num" id="openCount">0</div><div class="label">空き</div></div>
<div class="stat-card busy"><div class="num" id="busyCount">0</div><div class="label">予約済</div></div>
</div>
<div class="nav">
<button id="prevWeek">← 前の月曜</button>
<div class="date-label" id="dateLabel">-</div>
<button id="nextWeek">次の月曜 →</button>
</div>
<div class="holiday-toggle">
<button id="holidayBtn">この日を一括休業にする</button>
</div>
<div class="help-text">
「操作」をクリックすると電話予約の登録、または時間帯の休業設定ができます。<br>
「取消」をクリックするとその予約をキャンセルできます（メールが登録されていれば通知されます）。
</div>
<div id="content"></div>
</div>
</div>
<div class="overlay" id="overlay">
<div class="modal">
<h2 id="modalTitle">この時間帯の操作</h2>
<div class="sub" id="modalDateTime">-</div>
<div id="actionChoice">
<div class="modal-actions" style="margin-top:0;">
<button class="btn-confirm" id="choosePhoneBtn" style="flex:1;">電話予約を登録</button>
</div>
<div class="modal-actions">
<button class="btn-cancel" id="chooseBlockBtn" style="flex:1;">この時間を休業にする</button>
</div>
<div class="modal-actions">
<button class="btn-cancel" id="closeChoiceBtn" style="flex:1;">閉じる</button>
</div>
</div>
<div id="phoneForm" style="display:none;">
<div class="field">
<label>お名前</label>
<input type="text" id="nameInput" placeholder="山田 太郎">
</div>
<div class="field">
<label>電話番号</label>
<input type="tel" id="phoneInput" placeholder="090xxxxxxxx">
</div>
<div class="field">
<label>メールアドレス（任意）</label>
<input type="email" id="emailInput" placeholder="example@mail.com">
</div>
<div class="modal-actions">
<button class="btn-cancel" id="backFromPhoneBtn">戻る</button>
<button class="btn-confirm" id="savePhoneBtn">登録する</button>
</div>
</div>
</div>
</div>
<div class="toast" id="toast">完了しました</div>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ====== Firebase 設定（index.html と必ず同じ設定） ======
const firebaseConfig = {
apiKey: "AIzaSyC6MIhkE9m9aZAkAJ9mEZgsRsbKeVdCw_A",
authDomain: "daimon-re.firebaseapp.com",
databaseURL: "https://daimon-re-default-rtdb.firebaseio.com",
projectId: "daimon-re",
storageBucket: "daimon-re.firebasestorage.app",
messagingSenderId: "909427241209",
appId: "1:909427241209:web:440f847dbbd1d3802fb228"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ====== Google Apps Script（メール通知・カレンダー登録） ======
const GAS_URL = "https://script.google.com/macros/s/AKfycbyrYcdIbQ19gP0bUJqRT6Vxqk66RfAebU1WchqIj93zjEnX4BjWlvSXPvh2t18vq9-0/exec";

function notifyGas(payload){
fetch(GAS_URL, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'text/plain;charset=utf-8'},
body: JSON.stringify(payload)
}).catch(e=>console.error('GAS notify error', e));
}

function sendBookingEmails(payload){
notifyGas({
action: 'book', site: 'サロン予約', name: payload.name, phone: payload.phone, email: payload.email || '',
date: payload.dateKey, time: payload.time, cancelCode: payload.cancelCode
});
}

function notifyCancel(payload){
notifyGas({
action: 'cancel', site: 'サロン予約', name: payload.name || '', phone: payload.phone || '',
date: payload.dateKey, time: payload.time
});
}

// ====== 設定値 ======
const START_HOUR = 16;
const END_HOUR = 20;
const SLOT_MIN = 30;

function pad(n){return n.toString().padStart(2,'0');}
function generateSlots(){
const slots = [];
let h = START_HOUR, m = 0;
while(h < END_HOUR){
slots.push(`${pad(h)}:${pad(m)}`);
m += SLOT_MIN;
if(m >= 60){m = 0; h += 1;}
}
return slots;
}
const SLOTS = generateSlots();

function getMondayOfWeek(baseDate, weekOffset){
const d = new Date(baseDate);
d.setHours(0,0,0,0);
const day = d.getDay();
const diffToMonday = (day === 0 ? -6 : 1 - day);
d.setDate(d.getDate() + diffToMonday + weekOffset*7);
return d;
}
function formatDateKey(d){
return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function formatDateLabel(d){
return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（月）`;
}
function generateCancelCode(){
return Math.floor(100000 + Math.random()*900000).toString();
}

let currentMonday = getMondayOfWeek(new Date(), 0);
let currentStatus = {};
let currentPrivate = {};
let isHoliday = false;
let statusRef = null;
let privateRef = null;
let selectedSlot = null;

const dateLabel = document.getElementById('dateLabel');
const content = document.getElementById('content');
const holidayBtn = document.getElementById('holidayBtn');
const openCountEl = document.getElementById('openCount');
const busyCountEl = document.getElementById('busyCount');
const toast = document.getElementById('toast');
const overlay = document.getElementById('overlay');
const modalDateTime = document.getElementById('modalDateTime');
const actionChoice = document.getElementById('actionChoice');
const phoneForm = document.getElementById('phoneForm');
const nameInput = document.getElementById('nameInput');
const phoneInput = document.getElementById('phoneInput');
const emailInput = document.getElementById('emailInput');

function showToast(msg){
toast.textContent = msg;
toast.classList.add('show');
setTimeout(()=>toast.classList.remove('show'), 2600);
}

// ---------- Auth ----------
document.getElementById('googleLoginBtn').onclick = ()=>{
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider).catch(err=>{
showToast('ログインに失敗しました');
console.error(err);
});
};
document.getElementById('logoutBtn').onclick = ()=>{ auth.signOut(); };

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById('loginScreen').style.display='none';
document.getElementById('app').style.display='block';
document.getElementById('userEmail').textContent = user.email || user.displayName || 'unknown';
listenToWeek();
} else {
document.getElementById('loginScreen').style.display='flex';
document.getElementById('app').style.display='none';
if(statusRef) statusRef.off();
if(privateRef) privateRef.off();
}
});

// ---------- Rendering ----------
function renderClosed(){
holidayBtn.textContent = 'この日の休業を解除する';
holidayBtn.classList.add('active');
content.innerHTML = `
<div class="closed-card">
<div class="big">🌙</div>
<div>この日は休業に設定されています</div>
</div>`;
openCountEl.textContent = '0';
busyCountEl.textContent = '0';
}

function renderSlots(){
holidayBtn.textContent = 'この日を一括休業にする';
holidayBtn.classList.remove('active');
let openN = 0, busyN = 0;
let html = '<div class="slot-list">';
SLOTS.forEach(time=>{
const st = currentStatus[time] || 'open';
let cls, badge, rightHtml;
if(st === 'closed'){
cls='blocked'; badge='休業中';
rightHtml = `<button class="btn-unblock" onclick="unblockSlot('${time}')">解除</button>`;
} else if(st === 'booked'){
busyN++;
cls='busy'; badge='予約済み';
const detail = currentPrivate[time] || {};
rightHtml = `
<div class="info">
<span class="name">${escapeHtml(detail.name||'(名前なし)')}</span> 様
<span class="phone">${escapeHtml(detail.phone||'')}</span>
${detail.email ? `<span class="email">${escapeHtml(detail.email)}</span>` : ''}
<span class="code">番号: <b>${escapeHtml(detail.cancelCode||'-')}</b></span>
</div>
<button class="btn-cancel-r" onclick="cancelReservation('${time}')">取消</button>`;
} else {
openN++;
cls='open'; badge='空き';
rightHtml = `<button class="btn-phone-add" onclick="openModal('${time}')">操作</button>`;
}
html += `
<div class="slot ${cls}">
<div class="time">${time}</div>
${cls==='busy' ? rightHtml : `<span class="badge">${badge}</span>${rightHtml}`}
</div>`;
});
html += '</div>';
content.innerHTML = html;
openCountEl.textContent = openN;
busyCountEl.textContent = busyN;
}

function escapeHtml(s){
return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function listenToWeek(){
const dateKey = formatDateKey(currentMonday);
dateLabel.textContent = formatDateLabel(currentMonday);
if(statusRef) statusRef.off();
if(privateRef) privateRef.off();
statusRef = db.ref('status/' + dateKey);
privateRef = db.ref('private/' + dateKey);
let statusLoaded = false, privateLoaded = false;
function tryRender(){
if(!statusLoaded) return;
if(currentStatus.__holiday__ === true){
isHoliday = true;
renderClosed();
} else {
isHoliday = false;
renderSlots();
}
}
statusRef.on('value', snapshot=>{
currentStatus = snapshot.val() || {};
statusLoaded = true;
tryRender();
});
privateRef.on('value', snapshot=>{
currentPrivate = snapshot.val() || {};
privateLoaded = true;
tryRender();
});
}
document.getElementById('prevWeek').onclick = ()=>{ currentMonday.setDate(currentMonday.getDate()-7); listenToWeek(); };
document.getElementById('nextWeek').onclick = ()=>{ currentMonday.setDate(currentMonday.getDate()+7); listenToWeek(); };

// ---------- Holiday (whole day) ----------
holidayBtn.onclick = ()=>{
const dateKey = formatDateKey(currentMonday);
const statusDayRef = db.ref('status/' + dateKey);
if(isHoliday){
statusDayRef.remove().then(()=>showToast('休業を解除しました'));
} else {
if(!confirm('この日を一括で休業にします。既存の予約があれば確認してください。よろしいですか？')) return;
statusDayRef.set({__holiday__: true}).then(()=>showToast('休業に設定しました'));
}
};

// ---------- Slot-level actions ----------
window.openModal = function(time){
selectedSlot = time;
modalDateTime.textContent = `${formatDateLabel(currentMonday)} ${time}〜`;
actionChoice.style.display='block';
phoneForm.style.display='none';
nameInput.value=''; phoneInput.value=''; emailInput.value='';
overlay.classList.add('show');
};
document.getElementById('closeChoiceBtn').onclick = ()=>{ overlay.classList.remove('show'); selectedSlot=null; };
document.getElementById('choosePhoneBtn').onclick = ()=>{ actionChoice.style.display='none'; phoneForm.style.display='block'; };
document.getElementById('backFromPhoneBtn').onclick = ()=>{ phoneForm.style.display='none'; actionChoice.style.display='block'; };
document.getElementById('chooseBlockBtn').onclick = ()=>{
if(!selectedSlot) return;
const dateKey = formatDateKey(currentMonday);
db.ref(`status/${dateKey}/${selectedSlot}`).set('closed').then(()=>{
showToast('この時間帯を休業にしました');
overlay.classList.remove('show');
selectedSlot=null;
});
};
document.getElementById('savePhoneBtn').onclick = ()=>{
const name = nameInput.value.trim();
const phone = phoneInput.value.trim();
const email = emailInput.value.trim();
if(!name){ showToast('お名前を入力してください'); return; }
if(!selectedSlot) return;
const dateKey = formatDateKey(currentMonday);
const time = selectedSlot;
const cancelCode = generateCancelCode();
Promise.all([
db.ref(`status/${dateKey}/${time}`).set('booked'),
db.ref(`private/${dateKey}/${time}`).set({
name, phone, email, cancelCode, createdAt: Date.now(), bySalon: true
})
]).then(()=>{
sendBookingEmails({name, phone, email, dateKey, dateLabel: formatDateLabel(currentMonday), time, cancelCode});
showToast('電話予約を登録しました');
overlay.classList.remove('show');
selectedSlot=null;
});
};
window.cancelReservation = function(time){
if(!confirm(`${time} の予約を取り消します。よろしいですか？`)) return;
const dateKey = formatDateKey(currentMonday);
const detail = currentPrivate[time] || {};
Promise.all([
db.ref(`status/${dateKey}/${time}`).set('open'),
db.ref(`private/${dateKey}/${time}`).remove()
]).then(()=>{
notifyCancel({name: detail.name, phone: detail.phone, dateKey, time});
showToast('予約を取り消しました');
});
};
window.unblockSlot = function(time){
const dateKey = formatDateKey(currentMonday);
db.ref(`status/${dateKey}/${time}`).remove().then(()=>{
showToast('休業設定を解除しました');
});
};
overlay.addEventListener('click', (e)=>{
if(e.target === overlay){ overlay.classList.remove('show'); selectedSlot=null; }
});
</script>
</body>
</html>
